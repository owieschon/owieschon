name: verify-public-evidence

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  leakage-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Independently rebuild features and scores
        run: python3 case-studies/leakage_demo/verify_demo.py --json
      - name: Exercise verifier tamper checks
        working-directory: case-studies/leakage_demo
        run: python3 -m unittest -v test_verify_demo.py
